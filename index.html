<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Eins Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
}

/* 🧱 GRID LAYOUT */
.grid {
  display: grid;
  grid-template-columns: 140px repeat(4, 1fr);
  grid-template-rows: 80px repeat(2, 1fr);
  height: 100vh;
}

/* 🖼️ LOGO */
.logo {
  grid-column: 1;
  grid-row: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1b1b1b;
  border-right: 1px solid #333;
}

.logo img {
  max-width: 70px;
  max-height: 70px;
  object-fit: contain;
}

/* 📊 Kanal-Header */
.col-header {
  background: #1b1b1b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-bottom: 1px solid #333;
}

/* 📌 Zeilen-Header */
.row-header {
  background: #1b1b1b;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  border-right: 1px solid #333;
}

/* 📦 Zellen */
.cell {
  overflow-y: auto;
  background: #141414;
  padding: 6px;
}

/* 🎬 Video Card */
.video {
  display: flex;
  gap: 8px;
  background: #222;
  margin: 6px 0;
  padding: 6px;
  border-radius: 8px;
  align-items: center;
  font-size: 12px;
}

.video img {
  width: 85px;
  border-radius: 6px;
}

.video a {
  color: white;
  text-decoration: none;
}

/* Scrollbar */
.cell::-webkit-scrollbar {
  width: 5px;
}
.cell::-webkit-scrollbar-thumb {
  background: #333;
}

</style>
</head>

<body>

<div class="grid">

  <!-- 🖼️ LOGO -->
  <div class="logo">
    <img src="./assets/logo.png" alt="Logo">
  </div>

  <!-- 📊 KANÄLE -->
  <div class="col-header">Spandau</div>
  <div class="col-header">Media</div>
  <div class="col-header">LoL</div>
  <div class="col-header">Fußball</div>

  <!-- 🧾 ZEILE: VIDEOS -->
  <div class="row-header">Videos</div>

  <div class="cell" id="spandau-videos"></div>
  <div class="cell" id="media-videos"></div>
  <div class="cell" id="lol-videos"></div>
  <div class="cell" id="fussball-videos"></div>

  <!-- 🧾 ZEILE: SHORTS -->
  <div class="row-header">Shorts</div>

  <div class="cell" id="spandau-shorts"></div>
  <div class="cell" id="media-shorts"></div>
  <div class="cell" id="lol-shorts"></div>
  <div class="cell" id="fussball-shorts"></div>

</div>

<script>

const channels = {
  spandau: "UC5QM2OXKyZaNw13iLbuEpCg",
  media: "UCeuKtCc2Q0ySUxYX8yRZhcg",
  lol: "UCeM9ckIXeJFvdt4bKpXvTqw",
  fussball: "UCMQkXTIDVvVDh0ZuVB_0APg"
};

async function getFeed(channelId) {
  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url));
  const data = await res.json();
  return data.items || [];
}

function isShort(item) {
  return item.link.includes("/shorts/");
}

function getVideoId(url) {
  return url.split("v=")[1]?.split("&")[0] || url.split("/shorts/")[1];
}

function createVideo(item) {
  const id = getVideoId(item.link);
  const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  const div = document.createElement("div");
  div.className = "video";

  div.innerHTML = `
    <img src="${thumb}">
    <a href="${item.link}" target="_blank">${item.title}</a>
  `;

  return div;
}

async function loadColumn(prefix, channelId) {
  const items = await getFeed(channelId);

  const videosBox = document.getElementById(prefix + "-videos");
  const shortsBox = document.getElementById(prefix + "-shorts");

  videosBox.innerHTML = "";
  shortsBox.innerHTML = "";

  items.forEach(item => {
    const el = createVideo(item);

    if (isShort(item)) {
      shortsBox.appendChild(el);
    } else {
      videosBox.appendChild(el);
    }
  });
}

function loadAll() {
  Object.entries(channels).forEach(([key, id]) => {
    loadColumn(key, id);
  });
}

loadAll();

// 🔄 Auto Refresh alle 5 Minuten
setInterval(loadAll, 5 * 60 * 1000);

</script>

</body>
</html>
