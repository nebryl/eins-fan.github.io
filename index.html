<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsflix</title>

<link rel="icon" type="image/jpeg" href="./pic.jpg">

<script src="https://www.youtube.com/iframe_api"></script>

<style>

:root {
  --bg: #232321;
  --panel: #141413;
  --panel2: #1f1e1c;
  --text: #9B978E;
  --border: #3a3936;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* 📦 CONTAINER */
.container {
  padding: 20px;
}

/* 🖼️ LOGO */
.logo {
  width: 80px;
  margin-bottom: 20px;
  cursor: pointer;
}

.logo img {
  width: 60px;
}

/* 🎬 ROW */
.row {
  margin-bottom: 30px;
}

.row h2 {
  margin: 0 0 10px;
}

/* 📺 GRID ROW */
.row-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding-bottom: 10px;
}

.row-scroll::-webkit-scrollbar {
  display: none;
}

/* 🎬 CARD */
.video {
  min-width: 200px;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s ease;
  position: relative;
}

.video:hover {
  transform: scale(1.06);
}

/* 📸 THUMB */
.video img {
  width: 100%;
  display: block;
}

/* 📝 TITLE */
.video span {
  display: block;
  padding: 6px;
  font-size: 12px;
}

/* 🔴 MINI PROGRESS BAR */
.mini-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  width: 0%;
  background: red;
}

/* 🔥 MODAL */
.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 99999;
}

#player {
  width: 100%;
  height: 100%;
}

/* 🎮 TWITCH */
.twitch-btn {
  position: fixed;
  bottom: 15px;
  right: 15px;
  background: #9146FF;
  color: white;
  border: 1px solid var(--border);
  padding: 10px 12px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  z-index: 100000;
}

</style>
</head>

<body>

<div class="container">

  <div class="logo" onclick="reloadDashboard()">
    <img src="./pic.jpg">
  </div>

  <div class="row">
    <h2>Spandau</h2>
    <div class="row-scroll" id="spandau-videos"></div>
  </div>

  <div class="row">
    <h2>LoL</h2>
    <div class="row-scroll" id="lol-videos"></div>
  </div>

  <div class="row">
    <h2>Fußball</h2>
    <div class="row-scroll" id="fussball-videos"></div>
  </div>

  <div class="row">
    <h2>Media</h2>
    <div class="row-scroll" id="media-videos"></div>
  </div>

</div>

<div class="preview">
  <div id="player"></div>
</div>

<button class="twitch-btn" onclick="openTwitch()">🎮 Twitch</button>

<script>

const channels = {
  spandau: "UC5QM2OXKyZaNw13iLbuEpCg",
  lol: "UCeM9ckIXeJFvdt4bKpXvTqw",
  fussball: "UCMQkXTIDVvVDh0ZuVB_0APg",
  media: "UCeuKtCc2Q0ySUxYX8yRZhcg"
};

let player;
let currentVideo = null;

/* 📦 LOCAL STORAGE */
function saveProgress(id, time) {
  localStorage.setItem("vid_" + id, time);
}

function getProgress(id) {
  return localStorage.getItem("vid_" + id) || 0;
}

/* 📡 YOUTUBE API */
function onYouTubeIframeAPIReady() {}

function openPlayer(id) {
  currentVideo = id;

  document.querySelector(".preview").style.display = "block";

  if (player) {
    player.loadVideoById(id);
  } else {
    player = new YT.Player("player", {
      videoId: id,
      events: {
        onReady: () => setInterval(updateProgress, 500)
      }
    });
  }
}

/* 📊 SAVE + UPDATE PROGRESS */
function updateProgress() {
  if (!player || !currentVideo) return;

  const current = player.getCurrentTime();
  saveProgress(currentVideo, current);

  const duration = player.getDuration();
  const percent = (current / duration) * 100;

  const bar = document.querySelector(`[data-id="${currentVideo}"] .mini-progress`);
  if (bar) bar.style.width = percent + "%";
}

/* 🎬 CREATE CARD */
function createVideo(item) {
  const id = item.link.split("v=")[1]?.split("&")[0];

  const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  const div = document.createElement("div");
  div.className = "video";
  div.setAttribute("data-id", id);

  const saved = getProgress(id);

  div.innerHTML = `
    <img src="${thumb}">
    <span>${item.title}</span>
    <div class="mini-progress"></div>
  `;

  /* restore progress */
  setTimeout(() => {
    const durationFake = 100;
    const percent = (saved / durationFake) * 100;
    div.querySelector(".mini-progress").style.width = percent + "%";
  }, 100);

  div.addEventListener("click", () => openPlayer(id));

  return div;
}

/* 📥 LOAD */
async function getFeed(id) {
  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url)
  );
  const data = await res.json();
  return data.items;
}

async function loadColumn(key, id) {
  const items = await getFeed(id);

  const box = document.getElementById(key + "-videos");
  box.innerHTML = "";

  items.forEach(v => box.appendChild(createVideo(v)));
}

function loadAll() {
  Object.entries(channels).forEach(([k, v]) => loadColumn(k, v));
}

loadAll();

/* 🎮 TWITCH */
function openTwitch() {
  window.open("https://www.twitch.tv/eintrachtspandau", "_blank");
}

/* 🔄 CLOSE MODAL */
document.addEventListener("click", (e) => {
  if (e.target.classList.contains("preview")) {
    document.querySelector(".preview").style.display = "none";
  }
});

</script>

</body>
</html>
