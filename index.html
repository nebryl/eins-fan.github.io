<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Einsflix</title>

<link rel="icon" type="image/jpeg" href="./pic.jpg">
<script src="https://www.youtube.com/iframe_api"></script>

<style>

:root {
  --bg: #141413;
  --text: #9B978E;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* ================= LOGIN ================= */

#loginView {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 260px;
  margin: 150px auto;
  text-align: center;
}

#loginView input {
  padding: 10px;
  border: none;
  border-radius: 8px;
}

#loginView button {
  padding: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* ================= APP ================= */

#appView {
  display: none;
}

.container {
  padding: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px 20px;
}

.logout {
  cursor: pointer;
  background: #333;
  padding: 6px 10px;
  border-radius: 6px;
}

/* ROWS */

.row {
  margin-bottom: 30px;
}

.row h2 {
  margin-bottom: 10px;
}

.row-scroll {
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

.row-scroll::-webkit-scrollbar {
  display: none;
}

/* VIDEO CARD */

.video {
  min-width: 200px;
  background: #2a2926;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
}

.video img {
  width: 100%;
}

.video span {
  display: block;
  padding: 6px;
  font-size: 12px;
}

.mini-progress {
  position: absolute;
  top: 0;
  left: 0;
  height: 4px;
  width: 0%;
  background: red;
}

/* ================= PLAYER ================= */

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 999;
}

.preview {
  position: fixed;
  display: none;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 800px;
  height: 450px;
  background: black;
  border-radius: 12px;
  overflow: hidden;
  z-index: 1000;
}

#player {
  width: 100%;
  height: 100%;
}

</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginView">
  <h2>Einsflix Login</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Passwort">

  <button onclick="handleLogin()">Login</button>
</div>

<!-- 📺 APP -->
<div id="appView">

  <div class="topbar">
    <div id="welcome"></div>
    <div class="logout" onclick="logout()">Logout</div>
  </div>

  <div class="container">

    <div class="row">
      <h2>Eintracht Spandau</h2>
      <div class="row-scroll" id="spandau-videos"></div>
    </div>

    <div class="row">
      <h2>LoL</h2>
      <div class="row-scroll" id="lol-videos"></div>
    </div>

  </div>

</div>

<!-- 🎬 PLAYER -->
<div id="overlay"></div>

<div class="preview" id="playerView">
  <div id="player"></div>
</div>

<script>

/* ================= AUTH ================= */

const FAKE_PASSWORD = "EinsAufDieEins";

function handleLogin() {

  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (!user || user.trim() === "") return;

  if (pass === FAKE_PASSWORD) {

    localStorage.setItem("user", user);
    localStorage.setItem("loggedIn", "true");

    startApp();
  } else {
    alert("Falsches Passwort");
  }
}

function isLoggedIn() {
  return localStorage.getItem("loggedIn") === "true";
}

function getUser() {
  return localStorage.getItem("user");
}

function logout() {
  localStorage.clear();
  location.reload();
}

/* ================= APP START ================= */

function startApp() {

  document.getElementById("loginView").style.display = "none";
  document.getElementById("appView").style.display = "block";

  document.getElementById("welcome").innerText =
    "Willkommen " + getUser();

  loadAll();
}

window.onload = () => {
  if (isLoggedIn()) {
    startApp();
  }
};

/* ================= YOUTUBE ================= */

let player;

/* VIDEO ID */
function getVideoId(url) {
  return url.split("v=")[1]?.split("&")[0];
}

/* CARD */
function createVideo(item) {

  const id = getVideoId(item.link);
  const thumb = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;

  const div = document.createElement("div");
  div.className = "video";

  div.innerHTML = `
    <img src="${thumb}">
    <span>${item.title}</span>
    <div class="mini-progress"></div>
  `;

  div.onclick = () => openPlayer(id);

  return div;
}

/* LOAD */
async function loadColumn(id, container) {

  const url = `https://www.youtube.com/feeds/videos.xml?channel_id=${id}`;
  const res = await fetch(
    "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(url)
  );

  const data = await res.json();

  const box = document.getElementById(container);
  box.innerHTML = "";

  data.items.forEach(v => {
    box.appendChild(createVideo(v));
  });
}

function loadAll() {
  loadColumn("UC5QM2OXKyZaNw13iLbuEpCg", "spandau-videos");
  loadColumn("UCeM9ckIXeJFvdt4bKpXvTqw", "lol-videos");
}

/* ================= PLAYER ================= */

function openPlayer(id) {

  document.getElementById("overlay").style.display = "block";
  document.getElementById("playerView").style.display = "block";

  if (!player) {
    player = new YT.Player("player", {
      videoId: id,
      playerVars: { autoplay: 1 }
    });
  } else {
    player.loadVideoById(id);
  }
}

document.getElementById("overlay").onclick = () => {
  document.getElementById("overlay").style.display = "none";
  document.getElementById("playerView").style.display = "none";

  if (player) player.stopVideo();
};

</script>

</body>
</html>
